# ============================================================
# FILE INDEXER CONFIGURATION
# ============================================================
#
# The indexer scans finalized machine folders on the jump host.
#
# It creates one global file_index.csv that can later be copied
# into the Data Lake.
#
# Important:
# - The indexer never moves, copies or deletes machine files.
# - Powerbi_Index is excluded to prevent the CSV from indexing itself.
# - Powerbi_Details is excluded because these files are imported separately.
# - Logs are excluded because they do not belong in the searchable file index.
#
# ============================================================


# ============================================================
# 1. GLOBAL OUTPUT PATH
# ============================================================

file_index_output = "V:/Powerbi_Index/file_index.csv"


# ============================================================
# 2. MACHINES TO SCAN
# ============================================================

[[devices]]

device = "KeyenceVR5200"

scan_folder = "V:/"

excluded_folders = [
    "Powerbi_Index",
    "Powerbi_Details",
    "Logs",
]


# ============================================================
# 3. PRODUCT-SPECIFIC RECIPE FOLDERS
# ============================================================

[product_rules]

"EMB_Gan_Prüfvorlage_zit" = "EMB_Gan"