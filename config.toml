# ============================================================
# FILE INDEXER CONFIGURATION
# ============================================================
#
# The indexer scans finalized machine folders on the jump host.
#
# It creates one global file_index.csv that can later be copied
# into the Data Lake.
#
# Important:
# - The indexer never moves, copies or deletes machine files.
# - Powerbi_Index is excluded to prevent the CSV from indexing itself.
# - Powerbi_Details is excluded because these detail CSV files are
#   imported separately and do not belong in the searchable file index.
#
# ============================================================


# ============================================================
# 1. GLOBAL OUTPUT PATH
# ============================================================

# Local test output path.
#
# The final production value will be:
# file_index_output = "V:/Powerbi_Index/file_index.csv"

file_index_output = "V:/Powerbi_Index/file_index.csv"


# ============================================================
# 2. MACHINES TO SCAN
# ============================================================

# Local test configuration for the Keyence VR-5200.
#
# The final production value will be:
# scan_folder = "V:/"

[[devices]]

device = "KeyenceVR5200"

scan_folder = "V:/"

excluded_folders = [
    "Powerbi_Index",
    "Powerbi_Details",
]


# ============================================================
# 3. PRODUCT-SPECIFIC RECIPE FOLDERS
# ============================================================

# If a file is located inside one of these recipe folders,
# product_area is set to the configured value.
#
# Example:
# EMB_Gan_Prüfvorlage_zit/
# -> EMB_Gan
#
# Every file outside a configured product folder:
# -> General
#
# Additional recipes can be added later without changing Python code.

[product_rules]

"EMB_Gan_Prüfvorlage_zit" = "EMB_Gan"